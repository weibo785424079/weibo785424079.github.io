        <h1 id="新增功能"><a href="#新增功能" class="headerlink" title="新增功能"></a>新增功能</h1><h2 id="1，可选链"><a href="#1，可选链" class="headerlink" title="1，可选链 ?."></a>1，可选链 ?.</h2><figure class="highlight ts"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">let</span> x = foo.bar.baz()</span><br><span class="line">  =&gt;</span><br><span class="line"><span class="keyword">let</span> x = (f===<span class="literal">null</span> || foo === <span class="literal">undefined</span>) ?</span><br><span class="line">      Undefined :</span><br><span class="line">      foo.bar.baz()</span><br></pre></td></tr></table></figure>
<p>不同于&amp;&amp;，这个操作符仅处理null和undefined</p>
<h2 id="2，空值合并"><a href="#2，空值合并" class="headerlink" title="2，空值合并 ??"></a>2，空值合并 ??</h2>  <figure class="highlight ts"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">let</span> x = foo ?? Bar()</span><br><span class="line">=&gt;</span><br><span class="line"><span class="keyword">let</span> x = (foo!==<span class="literal">null</span>&amp;&amp;foo!==<span class="literal">undefined</span>) ?</span><br><span class="line">  foo :</span><br><span class="line">  bar()</span><br></pre></td></tr></table></figure>
<p>  同可选链, 只判断null和iundefined，(|| 会有意外发生，因为 0 NaN ‘’ 会被认为是假)</p>
